services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2025-latest
    user: root
    environment:
      SA_PASSWORD: "YourStrong!Passw0rd"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql/data
      - ./docker/mssql:/var/opt/mssql/backup
    entrypoint:
      - bash
      - -c
      - |
        chown -R mssql:mssql /var/opt/mssql/data
        exec /opt/mssql/bin/launch_sqlservr.sh /opt/mssql/bin/sqlservr
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourStrong!Passw0rd' -C -Q "SELECT 1" -b -o /dev/null
      interval: 10s
      retries: 10
      start_period: 30s

  init-db:
    image: mcr.microsoft.com/mssql/server:2025-latest
    depends_on:
      sqlserver:
        condition: service_healthy
    entrypoint: |
      bash -c "
      for i in {1..30}; do
        /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P 'YourStrong!Passw0rd' -C -d master -i /scripts/restore.sql && exit 0
        sleep 2
      done
      exit 1
      "
    environment:
      ACCEPT_EULA: "Y"
    volumes:
      - ./docker/mssql/restore.sql:/scripts/restore.sql

  app:
    build: .
    ports:
      - "5000:8080"
    depends_on:
      init-db:
        condition: service_completed_successfully
    environment:
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=AutoAsk;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True;MultipleActiveResultSets=true;"

volumes:
  sqldata:

